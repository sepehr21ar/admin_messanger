<!DOCTYPE html>
<html lang="fa">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change password</title>
</head>
<body>
<div class="container">
  <div class="password-page-card">
    <div class="password-page-header">
      <h2>Change password</h2>
      <button id="backBtn" class="btn-secondary">Back</button>
    </div>

    <div class="form-group">
      <label>Current password</label>
      <input type="password" id="currentPassword" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>New password</label>
      <input type="password" id="newPassword" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm new password</label>
      <input type="password" id="confirmPassword" autocomplete="new-password">
    </div>

    <button id="changePasswordBtn">Change password</button>
    <div id="passwordMsg"></div>
  </div>
</div>

<script src="./common.js"></script>
<script>
  const tokenData = parseToken();
  if (!tokenData) {
    logout();
    throw new Error("Login required");
  }

  const backUrl = tokenData.role === "admin" ? "admin.html" : "user.html";
  document.getElementById("backBtn").onclick = () => window.location.href = backUrl;

  async function submitPasswordChange() {
    const msgDiv = document.getElementById("passwordMsg");
    const button = document.getElementById("changePasswordBtn");
    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    msgDiv.className = "";
    msgDiv.textContent = "";

    if (!currentPassword || !newPassword || !confirmPassword) {
      showPasswordMessage("Please fill all password fields.", "error");
      return;
    }
    if (newPassword !== confirmPassword) {
      showPasswordMessage("New password and confirmation do not match.", "error");
      return;
    }

    button.disabled = true;
    button.textContent = "Changing...";
    try {
      await changePassword(currentPassword, newPassword, confirmPassword);
      document.getElementById("currentPassword").value = "";
      document.getElementById("newPassword").value = "";
      document.getElementById("confirmPassword").value = "";
      showPasswordMessage("Password changed successfully.", "success");
      setTimeout(() => window.location.href = backUrl, 900);
    } catch (err) {
      showPasswordMessage(err.message, "error");
    } finally {
      button.disabled = false;
      button.textContent = "Change password";
    }
  }

  function showPasswordMessage(message, type) {
    const msgDiv = document.getElementById("passwordMsg");
    msgDiv.textContent = message;
    msgDiv.className = type === "success" ? "password-success" : "password-error";
  }

  document.getElementById("changePasswordBtn").addEventListener("click", submitPasswordChange);
  document.querySelectorAll("input").forEach(input => {
    input.addEventListener("keypress", event => {
      if (event.key === "Enter") submitPasswordChange();
    });
  });
</script>
</body>
</html>
