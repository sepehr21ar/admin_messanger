<!DOCTYPE html>
<html lang="fa">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">zz
<title>Invited-Only Admin-Controlled       Messanger-System</title>

</head>
<body>
<div class="container">
  <div class="system-title"> Invited-Only Admin-Controlled Messanger-System</div>
  <h2>🔐 ورود به سامانه</h2>
  <div class="input-group">
    <label>👤 نام کاربری</label>
    <input type="text" id="username" placeholder="نام کاربری خود را وارد کنید" autofocus>
  </div>
  <div class="input-group">
    <label>🔒 رمز عبور</label>
    <input type="password" id="password" placeholder="رمز عبور">
  </div>
  <button id="loginBtn">ورود</button>
  <div id="msg"></div>
  <div class="help-text">
    ❓ حساب کاربری ندارید؟ با مدیر سیستم تماس بگیرید
  </div>
</div>

<script src="./common.js"></script>
<script>
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const msgDiv = document.getElementById('msg');

  let isLoading = false;

  async function login() {
    if (isLoading) return;
    
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      showMessage('لطفاً نام کاربری و رمز عبور را وارد کنید', 'error');
      return;
    }

    isLoading = true;
    loginBtn.disabled = true;
    loginBtn.textContent = 'در حال ورود...';
    showMessage('', '');

    try {
      const res = await fetch(API_URL + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username, password })
      });
      const data = await res.json();
      
      if (!res.ok) {
        showMessage(data.detail || 'نام کاربری یا رمز عبور اشتباه است', 'error');
        passwordInput.value = '';
        passwordInput.focus();
        return;
      }
      
      localStorage.setItem("token", data.access_token);
      const payload = JSON.parse(atob(data.access_token.split('.')[1]));
      window.location.href = payload.role === "admin" ? "admin.html" : "user.html";
      
    } catch(err) {
      showMessage("❌ سرور در دسترس نیست. لطفاً بعداً تلاش کنید", 'error');
    } finally {
      isLoading = false;
      loginBtn.disabled = false;
      loginBtn.textContent = 'ورود';
    }
  }

  function showMessage(text, type) {
    msgDiv.textContent = text;
    msgDiv.className = type === 'error' ? 'error' : '';
    if (!text) msgDiv.className = '';
  }

  const handleEnter = (e) => { if(e.key === 'Enter') login(); };
  usernameInput.addEventListener('keypress', handleEnter);
  passwordInput.addEventListener('keypress', handleEnter);
  loginBtn.addEventListener('click', login);
</script>
</body>
</html>
