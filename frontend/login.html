<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invited-Only Admin-Controlled       Messanger-System</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0935f9 0%, #ff1111  100%);
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    direction: rtl;
  }
  .container {
    background: rgba(255, 255, 255, 0.95);
    padding: 2rem;
    border-radius: 24px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 420px;
    transition: transform 0.3s;
    backdrop-filter: blur(2px);
  }
  .system-title {
    text-align: center;
    font-size: 14px;
    color: #4b5563;
    margin-bottom: 0.5rem;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  h2 {
    text-align: center;
    color: #1e293b;
    margin-bottom: 1.8rem;
    font-weight: 600;
  }
  .input-group {
    margin-bottom: 1.2rem;
  }
  label {
    display: block;
    margin-bottom: 0.4rem;
    font-weight: 600;
    color: #334155;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    font-size: 16px;
    transition: all 0.3s;
    background: #f8fafc;
  }
  input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    background: white;
  }
  button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(37,99,235,0.3);
  }
  button:active {
    transform: scale(0.98);
  }
  button:disabled {
    background: #94a3b8;
    transform: none;
    cursor: not-allowed;
  }
  #msg {
    margin-top: 1rem;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    font-weight: 500;
  }
  .error {
    background: #fee2e2;
    color: #dc2626;
    border-right: 4px solid #dc2626;
  }
  .help-text {
    font-size: 13px;
    color: #64748b;
    margin-top: 1rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <div class="system-title"> Invited-Only Admin-Controlled Messanger-System</div>
  <h2>🔐 ورود به سامانه</h2>
  <div class="input-group">
    <label>👤 نام کاربری</label>
    <input type="text" id="username" placeholder="نام کاربری خود را وارد کنید" autofocus>
  </div>
  <div class="input-group">
    <label>🔒 رمز عبور</label>
    <input type="password" id="password" placeholder="رمز عبور">
  </div>
  <button id="loginBtn">ورود</button>
  <div id="msg"></div>
  <div class="help-text">
    ❓ حساب کاربری ندارید؟ با مدیر سیستم تماس بگیرید
  </div>
</div>

<script src="./common.js"></script>
<script>
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const msgDiv = document.getElementById('msg');

  let isLoading = false;

  async function login() {
    if (isLoading) return;
    
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      showMessage('لطفاً نام کاربری و رمز عبور را وارد کنید', 'error');
      return;
    }

    isLoading = true;
    loginBtn.disabled = true;
    loginBtn.textContent = 'در حال ورود...';
    showMessage('', '');

    try {
      const res = await fetch(API_URL + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username, password })
      });
      const data = await res.json();
      
      if (!res.ok) {
        showMessage(data.detail || 'نام کاربری یا رمز عبور اشتباه است', 'error');
        passwordInput.value = '';
        passwordInput.focus();
        return;
      }
      
      localStorage.setItem("token", data.access_token);
      const payload = JSON.parse(atob(data.access_token.split('.')[1]));
      window.location.href = payload.role === "admin" ? "admin.html" : "user.html";
      
    } catch(err) {
      showMessage("❌ سرور در دسترس نیست. لطفاً بعداً تلاش کنید", 'error');
    } finally {
      isLoading = false;
      loginBtn.disabled = false;
      loginBtn.textContent = 'ورود';
    }
  }

  function showMessage(text, type) {
    msgDiv.textContent = text;
    msgDiv.className = type === 'error' ? 'error' : '';
    if (!text) msgDiv.className = '';
  }

  const handleEnter = (e) => { if(e.key === 'Enter') login(); };
  usernameInput.addEventListener('keypress', handleEnter);
  passwordInput.addEventListener('keypress', handleEnter);
  loginBtn.addEventListener('click', login);
</script>
</body>
</html>
