<!DOCTYPE html>
<html lang="fa">
<head>
<link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق پیام‌ها - کاربر</title>

</head>
<body>
<div class="container">
  <div class="header">
    <h2>📥 صندوق پیام‌های من</h2>
    <div class="user-info" id="userInfoDisplay"></div>
    <div>
      <button class="password-btn" onclick="window.location.href='change_password.html'">Change password</button>
      <button class="refresh-btn" onclick="loadInboxWithFeedback()">🔄 بارگذاری</button>
      <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
  </div>

  <div class="two-columns">
    <div class="messages-panel" id="inboxContainer">
      <div class="loading">در حال بارگذاری پیام‌ها...</div>
    </div>
    <div class="content-panel" id="messageDetail">
      <div class="empty-state">📭 روی یک پیام کلیک کنید<br>متن آن در اینجا نمایش داده می‌شود</div>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
  let currentOpenId = null;
  let inboxMessages = [];      
  let tokenData = parseToken();

  if (!tokenData) {
    logout();
  } else {
    const username = tokenData.username || tokenData.sub || "کاربر";
    document.getElementById('userInfoDisplay').innerHTML = `👤 Welcome ${username} (ID : ${tokenData.user_id})`;
  }

  function sortMessages(messages) {
    return [...messages].sort((a, b) => {
      if (a.is_read !== b.is_read) {
        return a.is_read ? 1 : -1;   
      }
      const dateA = a.created_at ? new Date(a.created_at).getTime() : 0;
      const dateB = b.created_at ? new Date(b.created_at).getTime() : 0;
      return dateB - dateA;
    });
  }

  function renderInbox() {
    const container = document.getElementById('inboxContainer');
    if (!inboxMessages || inboxMessages.length === 0) {
      container.innerHTML = '<div class="empty-state">📭 پیامی وجود ندارد</div>';
      return;
    }

    const sorted = sortMessages(inboxMessages);
    container.innerHTML = '';
    sorted.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message-item ${!msg.is_read ? 'unread' : ''}`;
      if (currentOpenId === msg.id) div.classList.add('selected');
      div.setAttribute('data-id', msg.id);
      div.innerHTML = `
        <div class="message-title">📌 ${escapeHtml(msg.title)}</div>
        <div class="message-sender">از: ${escapeHtml(msg.sender || 'سیستم')}</div>
        ${msg.attachment ? '<div class="message-sender">Attachment: ' + escapeHtml(msg.attachment.filename || 'file') + '</div>' : ''}
        <div class="message-sender" style="font-size:10px; color:#888;">📅 ${formatDate(msg.created_at)}</div>
      `;
      div.onclick = (function(id) {
        return function() { openMessageDetail(id); };
      })(msg.id);
      container.appendChild(div);
    });
  }

  async function loadInboxWithFeedback() {
    const container = document.getElementById('inboxContainer');
    container.innerHTML = '<div class="loading">🔄 در حال بارگذاری...</div>';
    try {
      const res = await fetch(API_URL + "/messages/inbox", { headers: authHeaders() });
      if (!res.ok) throw new Error('خطا در دریافت پیام‌ها');
      inboxMessages = await res.json();
      if (!inboxMessages.some(m => m.id === currentOpenId)) {
        currentOpenId = null;
        document.getElementById('messageDetail').innerHTML = '<div class="empty-state">📭 روی یک پیام کلیک کنید<br>متن آن در اینجا نمایش داده می‌شود</div>';
      }
      renderInbox();
      if (currentOpenId) {
        const stillOpenMsg = inboxMessages.find(m => m.id === currentOpenId);
        if (stillOpenMsg) {
          displayMessageDetail(stillOpenMsg);
        }
      }
    } catch(err) {
      container.innerHTML = `<div class="empty-state">❌ خطا در دریافت پیام‌ها: ${err.message}</div>`;
    }
  }

  function displayMessageDetail(msg) {
    const detailDiv = document.getElementById('messageDetail');
    detailDiv.innerHTML = `
      <div>
        <h3>📄 ${escapeHtml(msg.title)}</h3>
        <p><strong>👤 فرستنده:</strong> ${escapeHtml(msg.sender || 'سیستم')}</p>
        <p><strong>📅 تاریخ:</strong> ${formatDate(msg.created_at)}</p>
        ${renderAttachment(msg.attachment)}
        <hr>
        <p style="white-space: pre-wrap;">${escapeHtml(msg.content)}</p>
      </div>
    `;
  }

  async function openMessageDetail(id) {
  if (currentOpenId === id) return;

  const detailDiv = document.getElementById('messageDetail');
  detailDiv.innerHTML = '<div class="loading">📖 در حال بارگذاری...</div>';

  try {
    const res = await fetch(API_URL + `/messages/${id}`, { headers: authHeaders() });
    if (!res.ok) throw new Error('خطا در دریافت متن پیام');
    const message = await res.json();

    const idx = inboxMessages.findIndex(m => m.id === id);
    if (idx !== -1) {
      inboxMessages[idx] = { ...inboxMessages[idx], ...message };
    } else {
      inboxMessages.push(message);
    }

    displayMessageDetail(message);
    currentOpenId = id;

    if (!message.is_read) {
      await fetch(API_URL + `/messages/${id}/read`, { method: "POST", headers: authHeaders() });
      message.is_read = true;
      renderInbox();  
      displayMessageDetail(message);
    } else {
      renderInbox();
    }
  } catch (err) {
    detailDiv.innerHTML = `<div class="empty-state">❌ خطا: ${err.message}</div>`;
  }
}

  function formatDate(dateStr) {
    if (!dateStr) return 'نامشخص';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('fa-IR') + ' ' + d.toLocaleTimeString('fa-IR');
    } catch(e) {
      return dateStr;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  function renderAttachment(attachment) {
    if (!attachment) return '';
    return `<p><strong>Attachment:</strong> <button class="btn-info btn-small" onclick="downloadAttachment('${attachment.url}')">${escapeHtml(attachment.filename || 'Download file')}</button></p>`;
  }

  async function downloadAttachment(url) {
    const res = await fetch(API_URL + url, { headers: { "Authorization": "Bearer " + getToken() } });
    if (!res.ok) {
      alert('Could not download attachment');
      return;
    }
    const blob = await res.blob();
    const disposition = res.headers.get('content-disposition') || '';
    const match = disposition.match(/filename="?([^"]+)"?/i);
    const filename = match ? match[1] : 'attachment';
    const objectUrl = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = objectUrl;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(objectUrl);
  }

  loadInboxWithFeedback();
</script>
</body>
</html>
